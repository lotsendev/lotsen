name: Auto Tag

on:
  push:
    branches:
      - main

jobs:
  tag:
    name: Bump version and push tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          # A PAT is required here: events created by GITHUB_TOKEN do not
          # trigger downstream workflows, so the tag push would never fire
          # release.yml. RELEASES_TOKEN (already used in release.yml) works.
          github_token: ${{ secrets.RELEASES_TOKEN }}
          # Only bump when meaningful conventional commits are present.
          # chore/ci/docs/style/test commits do not produce a release.
          # feat → minor, fix/perf → patch, BREAKING CHANGE → major (default).
          # Explicitly mapping perf so it is never treated as a no-op.
          custom_release_rules: "perf:patch"
          default_bump: false
          release_branches: main
          tag_prefix: v
