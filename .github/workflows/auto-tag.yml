name: Auto Tag

on:
  workflow_dispatch:

jobs:
  version:
    name: Determine version
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next semver from conventional commits
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          [ -z "$LATEST" ] && LATEST="v0.0.0"

          COMMITS=$(git log --pretty=format:"%s%n%b" "${LATEST}..HEAD")
          if [ -z "$COMMITS" ]; then
            echo "No commits since ${LATEST}, skipping tag"
            exit 0
          fi

          BUMP="none"
          while IFS= read -r line; do
            # Footer token per conventional commits spec (must start the line).
            # This avoids matching prose like "e.g. BREAKING CHANGE -> major".
            if echo "$line" | grep -qE '^BREAKING[- ]CHANGE:'; then
              BUMP="major"; break
            fi
            if echo "$line" | grep -qE '^[a-z]+(\([^)]+\))?!:'; then
              BUMP="major"; break
            fi
            if echo "$line" | grep -qE '^feat(\([^)]+\))?:' && [ "$BUMP" != "major" ] && [ "$BUMP" != "minor" ]; then
              BUMP="minor"
            fi
            if echo "$line" | grep -qE '^(fix|perf)(\([^)]+\))?:' && [ "$BUMP" = "none" ]; then
              BUMP="patch"
            fi
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            echo "No releasable commits since ${LATEST}, skipping tag"
            exit 0
          fi

          VER=${LATEST#v}
          MAJOR=$(echo "$VER" | cut -d. -f1)
          MINOR=$(echo "$VER" | cut -d. -f2)
          PATCH=$(echo "$VER" | cut -d. -f3)
          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping ${LATEST} -> ${NEW_TAG} (${BUMP})"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          RELEASES_REMOTE="https://x-access-token:${{ secrets.RELEASES_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote "$RELEASES_REMOTE" >/dev/null 2>&1; then
            git push "$RELEASES_REMOTE" "$NEW_TAG"
          else
            echo "RELEASES_TOKEN has no access to ${GITHUB_REPOSITORY}; using default token"
            git push origin "$NEW_TAG"
          fi

          echo "Dispatching release workflow for ${NEW_TAG}"
          curl -sSf -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"tag\":\"${NEW_TAG}\"}}"
