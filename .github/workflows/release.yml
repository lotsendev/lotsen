name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  # Runs only on push to main. Parses conventional commits since the last tag,
  # determines the next vX.Y.Z, and pushes the tag. Downstream jobs key off the
  # outputs so the rest of the pipeline is shared with manual tag pushes.
  version:
    name: Determine version
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      skip: ${{ steps.bump.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next semver from conventional commits
        id: bump
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          [ -z "$LATEST" ] && LATEST="v0.0.0"

          COMMITS=$(git log --pretty=format:"%s%n%b" "${LATEST}..HEAD")
          if [ -z "$COMMITS" ]; then
            echo "No commits since ${LATEST}, skipping release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="none"
          while IFS= read -r line; do
            # Footer token per conventional commits spec (must start the line).
            # This avoids matching prose like "e.g. BREAKING CHANGE → major".
            if echo "$line" | grep -qE '^BREAKING[- ]CHANGE:'; then
              BUMP="major"; break
            fi
            if echo "$line" | grep -qE '^[a-z]+(\([^)]+\))?!:'; then
              BUMP="major"; break
            fi
            if echo "$line" | grep -qE '^feat(\([^)]+\))?:' && [ "$BUMP" != "major" ] && [ "$BUMP" != "minor" ]; then
              BUMP="minor"
            fi
            if echo "$line" | grep -qE '^(fix|perf)(\([^)]+\))?:' && [ "$BUMP" = "none" ]; then
              BUMP="patch"
            fi
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            echo "No releasable commits since ${LATEST}, skipping release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VER=${LATEST#v}
          MAJOR=$(echo "$VER" | cut -d. -f1)
          MINOR=$(echo "$VER" | cut -d. -f2)
          PATCH=$(echo "$VER" | cut -d. -f3)
          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping ${LATEST} → ${NEW_TAG} (${BUMP})"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

  ci-go:
    name: CI / Go
    needs: [version]
    # Run on tag pushes (version is skipped) or when version produced a new tag.
    if: ${{ always() && (github.ref_type == 'tag' || needs.version.outputs.skip == 'false') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('api/go.sum', 'orchestrator/go.sum', 'proxy/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Test API
        working-directory: api
        run: go test ./...

      - name: Test orchestrator
        working-directory: orchestrator
        run: go test ./...

      - name: Test proxy
        working-directory: proxy
        run: go test ./...

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: api

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: orchestrator

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: proxy

  ci-react:
    name: CI / React
    needs: [version]
    if: ${{ always() && (github.ref_type == 'tag' || needs.version.outputs.skip == 'false') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: dashboard/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('dashboard/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  build:
    name: Build artifacts
    needs: [ci-go, ci-react, version]
    if: ${{ always() && needs.ci-go.result == 'success' && needs.ci-react.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('api/go.sum', 'orchestrator/go.sum', 'proxy/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: dashboard/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('dashboard/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Build API binaries
        working-directory: api
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${{ github.ref_name }}" -o ../dirigent-linux-amd64 ./cmd/dirigent
          GOOS=linux GOARCH=arm64 go build -ldflags "-X main.version=${{ github.ref_name }}" -o ../dirigent-linux-arm64 ./cmd/dirigent

      - name: Build CLI binaries
        working-directory: cli
        run: |
          GOOS=linux GOARCH=amd64 go build -o ../dirigent-cli-linux-amd64 ./cmd/dirigent
          GOOS=linux GOARCH=arm64 go build -o ../dirigent-cli-linux-arm64 ./cmd/dirigent

      - name: Build orchestrator binaries
        working-directory: orchestrator
        run: |
          GOOS=linux GOARCH=amd64 go build -o ../dirigent-orchestrator-linux-amd64 ./cmd/orchestrator
          GOOS=linux GOARCH=arm64 go build -o ../dirigent-orchestrator-linux-arm64 ./cmd/orchestrator

      - name: Build proxy binaries
        working-directory: proxy
        run: |
          GOOS=linux GOARCH=amd64 go build -o ../dirigent-proxy-linux-amd64 ./cmd/proxy
          GOOS=linux GOARCH=arm64 go build -o ../dirigent-proxy-linux-arm64 ./cmd/proxy

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: bun install --frozen-lockfile

      - name: Build dashboard
        working-directory: dashboard
        run: bun run build

      - name: Package dashboard
        run: tar -czf dashboard.tar.gz -C dashboard dist server.ts package.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dirigent-linux-amd64
            dirigent-linux-arm64
            dirigent-cli-linux-amd64
            dirigent-cli-linux-arm64
            dirigent-orchestrator-linux-amd64
            dirigent-orchestrator-linux-arm64
            dirigent-proxy-linux-amd64
            dirigent-proxy-linux-arm64
            dashboard.tar.gz
            install.sh
            setup.sh

  release:
    name: GitHub Release
    needs: [build, version]
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || needs.version.outputs.tag }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name=${{ env.RELEASE_TAG }} \
            --jq '.body' > release-notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          gh release delete ${{ env.RELEASE_TAG }} --repo ercadev/dirigent-releases --yes || true
          gh release create ${{ env.RELEASE_TAG }} \
            --repo ercadev/dirigent-releases \
            --title "${{ env.RELEASE_TAG }}" \
            --notes-file release-notes.md \
            --latest \
            dirigent-linux-amd64 \
            dirigent-linux-arm64 \
            dirigent-cli-linux-amd64 \
            dirigent-cli-linux-arm64 \
            dirigent-orchestrator-linux-amd64 \
            dirigent-orchestrator-linux-arm64 \
            dirigent-proxy-linux-amd64 \
            dirigent-proxy-linux-arm64 \
            dashboard.tar.gz \
            install.sh \
            setup.sh

  docker-landing:
    name: Docker / Landing
    needs: [build, version]
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || needs.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push landing image
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ./website/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ercadevapps/dirigent:${{ env.RELEASE_TAG }}
            ercadevapps/dirigent:latest
