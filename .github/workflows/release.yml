name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (vX.Y.Z)"
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  ci-go:
    name: CI / Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: |
            api/go.sum
            orchestrator/go.sum
            proxy/go.sum

      - name: Test API
        working-directory: api
        run: go test ./...

      - name: Test orchestrator
        working-directory: orchestrator
        run: go test ./...

      - name: Test proxy
        working-directory: proxy
        run: go test ./...

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: api

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: orchestrator

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: proxy

  ci-react:
    name: CI / React
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: dashboard/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('dashboard/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  build:
    name: Build artifacts
    needs: [ci-go, ci-react]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: |
            api/go.sum
            orchestrator/go.sum
            proxy/go.sum

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: dashboard/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('dashboard/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Build CLI binaries
        working-directory: cli
        run: |
          GOOS=linux GOARCH=amd64 go build -o ../lotsen-cli-linux-amd64 ./cmd/lotsen
          GOOS=linux GOARCH=arm64 go build -o ../lotsen-cli-linux-arm64 ./cmd/lotsen

      - name: Build orchestrator binaries
        working-directory: orchestrator
        run: |
          GOOS=linux GOARCH=amd64 go build -o ../lotsen-orchestrator-linux-amd64 ./cmd/orchestrator
          GOOS=linux GOARCH=arm64 go build -o ../lotsen-orchestrator-linux-arm64 ./cmd/orchestrator

      - name: Build proxy binaries
        working-directory: proxy
        run: |
          GOOS=linux GOARCH=amd64 go build -o ../lotsen-proxy-linux-amd64 ./cmd/proxy
          GOOS=linux GOARCH=arm64 go build -o ../lotsen-proxy-linux-arm64 ./cmd/proxy

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: bun install --frozen-lockfile

      - name: Build dashboard
        working-directory: dashboard
        run: bun run build

      - name: Sync dashboard bundle into API module
        run: |
          mkdir -p api/internal/dashboard/static
          cp -R dashboard/dist/. api/internal/dashboard/static/

      - name: Build API binaries
        working-directory: api
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${{ env.RELEASE_TAG }}" -o ../lotsen-api-linux-amd64 ./cmd/lotsen
          GOOS=linux GOARCH=arm64 go build -ldflags "-X main.version=${{ env.RELEASE_TAG }}" -o ../lotsen-api-linux-arm64 ./cmd/lotsen

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            lotsen-api-linux-amd64
            lotsen-api-linux-arm64
            lotsen-cli-linux-amd64
            lotsen-cli-linux-arm64
            lotsen-orchestrator-linux-amd64
            lotsen-orchestrator-linux-arm64
            lotsen-proxy-linux-amd64
            lotsen-proxy-linux-arm64
            install.sh
            setup.sh

  release:
    name: GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name=${{ env.RELEASE_TAG }} \
            --jq '.body' > release-notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          gh release delete ${{ env.RELEASE_TAG }} --repo ercadev/dirigent-releases --yes || true
          gh release create ${{ env.RELEASE_TAG }} \
            --repo ercadev/dirigent-releases \
            --title "${{ env.RELEASE_TAG }}" \
            --notes-file release-notes.md \
            --latest \
            lotsen-api-linux-amd64 \
            lotsen-api-linux-arm64 \
            lotsen-cli-linux-amd64 \
            lotsen-cli-linux-arm64 \
            lotsen-orchestrator-linux-amd64 \
            lotsen-orchestrator-linux-arm64 \
            lotsen-proxy-linux-amd64 \
            lotsen-proxy-linux-arm64 \
            install.sh \
            setup.sh

  docker-landing:
    name: Docker / Landing
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push landing image
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ./website/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ercadevapps/dirigent:${{ env.RELEASE_TAG }}
            ercadevapps/dirigent:latest
