<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Dirigent</title>
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f1117;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{width:100%;max-width:360px;background:#1a1d27;border:1px solid #2d3148;border-radius:12px;padding:2rem}
h1{margin:0 0 1.5rem;font-size:1.25rem;font-weight:600;color:#f1f5f9}
label{display:block;font-size:.8125rem;font-weight:500;color:#94a3b8;margin-bottom:.375rem}
input{width:100%;padding:.625rem .75rem;background:#0f1117;border:1px solid #2d3148;border-radius:8px;color:#e2e8f0;font-size:.9375rem;outline:none;transition:border-color .15s}
input:focus{border-color:#6366f1}
.field{margin-bottom:1rem}
.error{margin-bottom:1rem;padding:.625rem .75rem;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;color:#fca5a5;font-size:.875rem}
button{width:100%;padding:.75rem;background:#6366f1;border:none;border-radius:8px;color:#fff;font-size:.9375rem;font-weight:600;cursor:pointer;transition:background .15s;margin-top:.5rem}
button:hover{background:#4f46e5}
</style>
</head>
<body>
<div class="card">
  <h1>Sign in</h1>
  {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
  <form method="POST" action="/__dirigent/login">
    <input type="hidden" name="redirect" value="{{.Redirect}}">
    <div class="field">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
